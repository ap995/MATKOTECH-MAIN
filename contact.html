<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matkotech | Contact Us</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .contact-page {
      min-height: 100vh;
      background:
        linear-gradient(rgba(244, 245, 248, 0.78), rgba(244, 245, 248, 0.9)),
        url("https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80") center / cover fixed no-repeat;
    }

    .contact-header {
      display: none;
    }

    .contact-main {
      width: calc(100vw - 152px);
      margin: 0 auto;
      padding: 49px 0 76px;
    }

    .contact-layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 39px;
      align-items: start;
    }

    .contact-panel {
      min-height: 748px;
      padding: 74px 60px 60px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .contact-panel:first-child {
      display: flex;
      flex-direction: column;
    }

    .contact-panel h1,
    .contact-panel h2 {
      margin: 0 0 54px;
      font-family: "Bodoni MT", Didot, "Times New Roman", serif;
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.15;
      color: #1c1d21;
    }

    .contact-details {
      display: grid;
      gap: 24px;
      margin-bottom: 32px;
    }

    .contact-detail {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 16px;
      align-items: start;
      color: #10131b;
      font-size: 1rem;
      line-height: 1.55;
    }

    .contact-detail svg,
    .contact-form-label svg {
      color: #16a34a;
      flex: 0 0 auto;
    }

    .contact-detail strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1rem;
      line-height: 1.2;
      color: #1c1d21;
    }

    .contact-detail a {
      color: inherit;
      text-decoration: none;
    }

    .contact-muted {
      color: #626b7a;
    }

    .contact-map {
      flex: 1 1 auto;
      min-height: 310px;
      margin-top: 10px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 12px;
      overflow: hidden;
      background: #eef2f7;
    }

    .contact-map iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .contact-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem 1.1rem;
    }

    .contact-form-grid .full-width {
      grid-column: 1 / -1;
    }

    .contact-form-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      color: #1f2329;
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .required-mark {
      color: #dc2626;
    }

    .contact-form-input,
    .custom-select-trigger {
      width: 100%;
      min-height: 54px;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 12px;
      background: #ffffff;
      color: #1c1d21;
      font: inherit;
      font-size: 1rem;
      transition: border-color 0.24s ease, box-shadow 0.24s ease;
    }

    textarea.contact-form-input {
      min-height: 132px;
      padding-top: 0.9rem;
      resize: vertical;
    }

    .contact-form-input:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12), 0 12px 26px rgba(15, 23, 42, 0.06);
    }

    .custom-select-wrapper {
      position: relative;
    }

    .custom-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .custom-options {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 10;
      display: none;
      max-height: 300px;
      overflow: auto;
      padding: 8px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .custom-select-wrapper.open .custom-options {
      display: grid;
      gap: 2px;
    }

    .custom-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      color: #1f2329;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .custom-option:hover,
    .custom-option.selected {
      background: rgba(249, 115, 22, 0.08);
      color: #ea580c;
    }

    .contact-submit {
      min-height: 54px;
      padding: 0.85rem 1.25rem;
      border: 0;
      border-radius: 8px;
      background: #f97316;
      color: #fff;
      font: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 1180px) {
      .contact-main {
        width: min(100vw - 32px, 900px);
        padding-top: 28px;
      }

      .contact-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .contact-main {
        padding-top: 22px;
      }

      .contact-panel {
        min-height: auto;
        padding: 28px 20px;
      }

      .contact-form-grid {
        grid-template-columns: 1fr;
      }

      .contact-detail {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body class="contact-page">
  <header class="site-header plain-header page-shell contact-header">
    <a class="brand" href="index.html" aria-label="Matkotech home">
      <img src="matkotech-logo.png" alt="Matkotech logo">
    </a>
    <nav class="pill-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="products-services.html">Products &amp; Services</a>
      <a class="active" href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main class="contact-main">
    <div class="contact-layout">
      <section class="contact-panel" aria-labelledby="contact-title">
        <h1 id="contact-title">Contact Us</h1>
        <div class="contact-details">
          <div class="contact-detail">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 21s7-4.7 7-11a7 7 0 1 0-14 0c0 6.3 7 11 7 11Z" stroke="currentColor" stroke-width="2" />
              <circle cx="12" cy="10" r="2.7" stroke="currentColor" stroke-width="2" />
            </svg>
            <div>
              <strong>Matkotech</strong>
              <a class="contact-muted" href="https://maps.google.com/maps?q=Matkotech,+1307+13th+Flr,+AWS-2,+Opp+Vasundhara+Society,+Gulbai+Tekra,+Ambavadi,+Ahmedabad" target="_blank" rel="noopener">
                1307- 13th Floor, AWS-2, Opp Vasundhara Society,<br>
                Gulbai Tekra, Ambavadi, Ahmedabad - 380006<br>
                Gujarat, India
              </a>
            </div>
          </div>

          <div class="contact-detail">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Z" stroke="currentColor" stroke-width="2" />
              <path d="m5 7 7 6 7-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <a href="mailto:sales@matkotech.com"><strong>sales@matkotech.com</strong></a>
          </div>

          <div class="contact-detail">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7.8 4.6c.4-.9 1.5-1.3 2.4-.9l1.9.9c.8.4 1.2 1.3 1 2.2l-.6 2.3a2 2 0 0 0 .5 1.8l1.2 1.2a2 2 0 0 0 1.8.5l2.3-.6c.9-.2 1.8.2 2.2 1l.9 1.9c.4.9 0 2-.9 2.4l-1.5.7c-1.7.8-3.6.9-5.4.3a17.1 17.1 0 0 1-9.9-9.9A6.7 6.7 0 0 1 3 5.4l.7-1.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
            <a href="tel:+919725695656"><strong>+91 9725695656</strong></a>
          </div>
        </div>

        <div class="contact-map">
          <iframe src="https://maps.google.com/maps?q=Gulbai+Tekra,+Ambavadi,+Ahmedabad&t=&z=14&ie=UTF8&iwloc=&output=embed" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </section>

      <section class="contact-panel" aria-labelledby="enquire-title">
        <h2 id="enquire-title">Enquire Now</h2>
        <form class="contact-form-grid" onsubmit="event.preventDefault()">
          <div>
            <label class="contact-form-label" for="full-name">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2.4"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2.4"/></svg>
              Full Name <span class="required-mark">*</span>
            </label>
            <input id="full-name" class="contact-form-input" type="text" required>
          </div>
          <div>
            <label class="contact-form-label" for="company-name">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="7" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2.4"/><path d="M9 21V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v16" stroke="currentColor" stroke-width="2.4"/></svg>
              Company Name <span class="required-mark">*</span>
            </label>
            <input id="company-name" class="contact-form-input" type="text" required>
          </div>
          <div>
            <label class="contact-form-label" for="phone-number">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7.8 4.6c.4-.9 1.5-1.3 2.4-.9l1.9.9c.8.4 1.2 1.3 1 2.2l-.6 2.3a2 2 0 0 0 .5 1.8l1.2 1.2a2 2 0 0 0 1.8.5l2.3-.6c.9-.2 1.8.2 2.2 1l.9 1.9c.4.9 0 2-.9 2.4l-1.5.7c-1.7.8-3.6.9-5.4.3a17.1 17.1 0 0 1-9.9-9.9A6.7 6.7 0 0 1 3 5.4l.7-1.5Z" stroke="currentColor" stroke-width="2.2"/></svg>
              Phone Number <span class="required-mark">*</span>
            </label>
            <input id="phone-number" class="contact-form-input" type="tel" required>
          </div>
          <div>
            <label class="contact-form-label" for="email-address">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Z" stroke="currentColor" stroke-width="2.2"/><path d="m5 7 7 6 7-6" stroke="currentColor" stroke-width="2.2"/></svg>
              Email Address <span class="required-mark">*</span>
            </label>
            <input id="email-address" class="contact-form-input" type="email" required>
          </div>
          <div class="full-width">
            <label class="contact-form-label">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2.4"/><path d="m21 21-4.4-4.4" stroke="currentColor" stroke-width="2.4"/></svg>
              Product / Services (optional)
            </label>
            <div class="custom-select-wrapper" id="serviceSelect">
              <button class="custom-select-trigger" type="button">
                <span id="serviceSelectText">Select Options</span>
                <svg width="16" height="10" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
              <div class="custom-options">
                <label class="custom-option"><input type="checkbox" value="Electrical Design"> Electrical Design</label>
                <label class="custom-option"><input type="checkbox" value="Mechanical Design"> Mechanical Design</label>
                <label class="custom-option"><input type="checkbox" value="Firmware Design"> Firmware Design</label>
                <label class="custom-option"><input type="checkbox" value="Software Development"> Software Development</label>
                <label class="custom-option"><input type="checkbox" value="Supply Chain Management"> Supply Chain Management</label>
                <label class="custom-option"><input type="checkbox" value="Program Management"> Program Management</label>
                <label class="custom-option"><input type="checkbox" value="Industrial Design"> Industrial Design</label>
                <label class="custom-option"><input type="checkbox" value="AI Solutions"> AI Solutions</label>
              </div>
            </div>
          </div>
          <div class="full-width">
            <label class="contact-form-label" for="message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10Z" stroke="currentColor" stroke-width="2.4"/></svg>
              Message
            </label>
            <textarea id="message" class="contact-form-input" placeholder="Message" required></textarea>
          </div>
          <div class="full-width">
            <label class="contact-form-label" for="files">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7-7Z" stroke="currentColor" stroke-width="2.4"/><path d="M13 2v7h7" stroke="currentColor" stroke-width="2.4"/></svg>
              Attach Files (optional)
            </label>
            <input id="files" class="contact-form-input" type="file" multiple>
          </div>
          <button class="contact-submit full-width" type="submit">Submit Enquiry</button>
        </form>
      </section>
    </div>
  </main>

  <script>
    const select = document.getElementById('serviceSelect');
    const trigger = select.querySelector('.custom-select-trigger');
    const text = document.getElementById('serviceSelectText');
    const options = Array.from(select.querySelectorAll('input[type="checkbox"]'));

    trigger.addEventListener('click', () => select.classList.toggle('open'));
    document.addEventListener('click', (event) => {
      if (!select.contains(event.target)) select.classList.remove('open');
    });
    options.forEach((option) => {
      option.addEventListener('change', () => {
        option.closest('.custom-option').classList.toggle('selected', option.checked);
        const selected = options.filter(item => item.checked).map(item => item.value);
        text.textContent = selected.length ? selected.join(', ') : 'Select Options';
      });
    });
  </script>
</body>

</html>
