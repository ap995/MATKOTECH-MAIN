<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8e8e8"/>
      <stop offset="1" stop-color="#d5d5d5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Helper function for gear -->
  <defs>
    <g id="gearTeeth8">
      <rect x="-8" y="-140" width="16" height="50" fill="#999999"/>
      <rect x="-8" y="90" width="16" height="50" fill="#999999"/>
      <rect x="90" y="-8" width="50" height="16" fill="#999999"/>
      <rect x="-140" y="-8" width="50" height="16" fill="#999999"/>
      <g transform="rotate(45)">
        <rect x="-8" y="-140" width="16" height="50" fill="#999999"/>
        <rect x="-8" y="90" width="16" height="50" fill="#999999"/>
        <rect x="90" y="-8" width="50" height="16" fill="#999999"/>
        <rect x="-140" y="-8" width="50" height="16" fill="#999999"/>
      </g>
    </g>
    
    <g id="gearTeeth12">
      <rect x="-10" y="-160" width="20" height="55" fill="#888888"/>
      <rect x="-10" y="105" width="20" height="55" fill="#888888"/>
      <rect x="105" y="-10" width="55" height="20" fill="#888888"/>
      <rect x="-160" y="-10" width="55" height="20" fill="#888888"/>
      <g transform="rotate(30)">
        <rect x="-10" y="-160" width="20" height="55" fill="#888888"/>
        <rect x="-10" y="105" width="20" height="55" fill="#888888"/>
        <rect x="105" y="-10" width="55" height="20" fill="#888888"/>
        <rect x="-160" y="-10" width="55" height="20" fill="#888888"/>
      </g>
      <g transform="rotate(60)">
        <rect x="-10" y="-160" width="20" height="55" fill="#888888"/>
        <rect x="-10" y="105" width="20" height="55" fill="#888888"/>
        <rect x="105" y="-10" width="55" height="20" fill="#888888"/>
        <rect x="-160" y="-10" width="55" height="20" fill="#888888"/>
      </g>
    </g>
  </defs>
  
  <!-- TOP LEFT: Large gear -->
  <g transform="translate(220, 200)">
    <circle cx="0" cy="0" r="160" fill="#d0d0d0" stroke="#a0a0a0" stroke-width="3"/>
    <circle cx="0" cy="0" r="130" fill="url(#bgGradient)" stroke="#b8b8b8" stroke-width="2"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <use href="#gearTeeth12" opacity="0.8"/>
  </g>

  <!-- TOP CENTER-LEFT: Medium gear (smaller, lighter) -->
  <g transform="translate(580, 140)" opacity="0.7">
    <circle cx="0" cy="0" r="95" fill="#d8d8d8" stroke="#aeaeae" stroke-width="2"/>
    <circle cx="0" cy="0" r="70" fill="url(#bgGradient)" stroke="#c0c0c0" stroke-width="1.5"/>
    <use href="#gearTeeth8" opacity="0.7" transform="scale(0.8)"/>
  </g>

  <!-- TOP RIGHT: Large gear -->
  <g transform="translate(1720, 240)">
    <circle cx="0" cy="0" r="155" fill="#d0d0d0" stroke="#a0a0a0" stroke-width="3"/>
    <circle cx="0" cy="0" r="125" fill="url(#bgGradient)" stroke="#b8b8b8" stroke-width="2"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <use href="#gearTeeth12" opacity="0.8"/>
  </g>

  <!-- MIDDLE RIGHT: Medium gear -->
  <g transform="translate(1650, 540)" opacity="0.75">
    <circle cx="0" cy="0" r="110" fill="#d0d0d0" stroke="#a8a8a8" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="85" fill="url(#bgGradient)" stroke="#b8b8b8" stroke-width="2"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#c8c8c8" stroke-width="1.5"/>
    <use href="#gearTeeth8" opacity="0.8"/>
  </g>

  <!-- BOTTOM RIGHT: Large gear (partial) -->
  <g transform="translate(1500, 950)">
    <circle cx="0" cy="0" r="180" fill="#d0d0d0" stroke="#a0a0a0" stroke-width="3"/>
    <circle cx="0" cy="0" r="150" fill="url(#bgGradient)" stroke="#b8b8b8" stroke-width="2"/>
    <circle cx="0" cy="0" r="115" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <use href="#gearTeeth12" opacity="0.8"/>
  </g>

  <!-- LEFT CENTER: Large gear -->
  <g transform="translate(140, 620)">
    <circle cx="0" cy="0" r="170" fill="#d0d0d0" stroke="#a0a0a0" stroke-width="3"/>
    <circle cx="0" cy="0" r="140" fill="url(#bgGradient)" stroke="#b8b8b8" stroke-width="2"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <use href="#gearTeeth12" opacity="0.8"/>
  </g>

  <!-- BOTTOM LEFT: Medium gear -->
  <g transform="translate(320, 920)" opacity="0.75">
    <circle cx="0" cy="0" r="100" fill="#d8d8d8" stroke="#aeaeae" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="75" fill="url(#bgGradient)" stroke="#c0c0c0" stroke-width="2"/>
    <use href="#gearTeeth8" opacity="0.8" transform="scale(0.85)"/>
  </g>

  <!-- Subtle light overlay for depth -->
  <rect width="100%" height="100%" fill="white" opacity="0.15"/>
</svg>